<!doctype html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9507769596803274"
     crossorigin="anonymous"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Flag with Canton (HTML+CSS)</title>
<style>
  :root{
    --flag-width: 900px;
    --flag-height: calc(var(--flag-width) * 0.6); /* 3:5 style */
    --stripe-count: 7;
    --canton-width: calc(var(--flag-width) * 0.4);
    --canton-height: calc(var(--flag-height) * 0.44);
  }

  body{
    display:flex;
    min-height:100vh;
    align-items:center;
    justify-content:center;
    background:#eef2f5;
    margin:0;
    font-family:system-ui, sans-serif;
  }

  .flag{
    width:var(--flag-width);
    height:var(--flag-height);
    border:2px solid #333;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    position:relative;
    overflow:hidden;
  }

  /* stripes */
  .stripe{
    width:100%;
    height:calc(100% / var(--stripe-count));
  }
  .stripe:nth-child(odd){ background:#c62828; } /* red */
  .stripe:nth-child(even){ background:#ffffff; } /* white */

  /* canton */
  .canton{
    position:absolute;
    top:0;
    left:0;
    width:var(--canton-width);
    height:var(--canton-height);
    background:#0b4c86; /* dark blue */
    display:flex;
    flex-wrap:wrap;
    align-content:center;
    justify-content:center;
    padding:8px;
    box-sizing:border-box;
  }

  /* simple star using CSS */
  .star {
    width:18px;
    height:18px;
    margin:4px;
    clip-path: polygon(
      50% 0%,
      61% 35%,
      98% 35%,
      68% 57%,
      79% 91%,
      50% 70%,
      21% 91%,
      32% 57%,
      2% 35%,
      39% 35%
    );
    background: #fff;
  }

  /* responsive: scale flag on small screens */
  @media (max-width:700px){
    :root{ --flag-width: 320px; }
  }
</style>
</head>
<body>
  <div class="flag" role="img" aria-label="Example flag with canton">
    <!-- stripes (7 shown) -->
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>
    <div class="stripe"></div>

    <!-- canton -->
    <div class="canton" aria-hidden="true">
      <!-- simple grid of stars -->
      <!-- change number of stars or their size in CSS -->
      <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
      <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>
  </div>
</body>
</html>
